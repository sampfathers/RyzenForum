<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم رایزن رول‌پلی | تمام‌صفحه</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* پس‌زمینه متحرک تمام‌صفحه */
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #222 0%, #000 80%);
            z-index: -2;
        }

        .particle-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.15"><circle cx="30" cy="30" r="2" fill="white"/><circle cx="150" cy="80" r="3" fill="white"/><circle cx="80" cy="160" r="1.5" fill="white"/><circle cx="180" cy="140" r="2.5" fill="white"/><circle cx="50" cy="200" r="2" fill="white"/></svg>');
            background-size: 300px 300px;
            animation: floatParticles 30s linear infinite;
            z-index: -1;
            opacity: 0.3;
        }

        @keyframes floatParticles {
            0% { background-position: 0 0; }
            100% { background-position: 300px 300px; }
        }

        /* انیمیشن‌ها */
        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px rgba(255,255,255,0.3), 0 0 10px rgba(255,255,255,0.2); }
            50% { box-shadow: 0 0 25px rgba(255,255,255,0.8), 0 0 40px rgba(255,255,255,0.3); }
            100% { box-shadow: 0 0 5px rgba(255,255,255,0.3), 0 0 10px rgba(255,255,255,0.2); }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== کانتینر اصلی تمام‌عرض ===== */
        .container {
            width: 100%;
            padding: 20px 40px;
            position: relative;
            z-index: 5;
        }

        /* ===== هدر پیشرفته ===== */
        .glass-header {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 15px 30px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: slideInUp 0.7s ease-out;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 2.2rem;
            color: #fff;
            filter: drop-shadow(0 0 8px white);
            animation: glowPulse 3s infinite;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-btn {
            background: transparent;
            border: 1.5px solid #444;
            color: #eee;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .user-btn:hover {
            border-color: white;
            background: rgba(255,255,255,0.05);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        .envelope-icon {
            font-size: 1.8rem;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            background: #1a1a1a;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid #444;
        }

        .envelope-icon:hover {
            transform: scale(1.1) rotate(5deg);
            border-color: white;
            box-shadow: 0 0 20px white;
        }

        .envelope-icon i {
            animation: pulseSoft 2s infinite;
        }

        @keyframes pulseSoft {
            0% { opacity: 0.8; }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.8; }
        }

        .unread-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4d4d;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 10px red;
            animation: glowPulse 1.5s infinite;
        }

        /* ===== فرم‌ها (تمام‌عرض با حاشیه داخلی) ===== */
        .form-switcher {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 35px;
        }

        .switch-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 2px solid #333;
            color: #ccc;
            padding: 14px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .switch-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .switch-btn:hover::before {
            left: 100%;
        }

        .switch-btn.active {
            background: white;
            color: black;
            border-color: white;
            box-shadow: 0 0 30px white;
        }

        .form-container {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.05);
            animation: fadeInScale 0.5s ease-out;
            margin-bottom: 30px;
            transition: box-shadow 0.3s;
        }

        .form-container:hover {
            box-shadow: 0 30px 80px rgba(255,255,255,0.1);
        }

        .form-title {
            font-size: 2rem;
            margin-bottom: 35px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ccc;
            letter-spacing: 0.5px;
            font-size: 1rem;
        }

        .input-group input, 
        .input-group textarea, 
        .input-group select {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0,0,0,0.5);
            border: 1.5px solid #2a2a2a;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .input-group input:focus, 
        .input-group textarea:focus, 
        .input-group select:focus {
            outline: none;
            border-color: white;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
            background: rgba(20,20,20,0.8);
        }

        .input-group textarea {
            border-radius: 25px;
            min-height: 110px;
        }

        .submit-btn {
            background: linear-gradient(145deg, #fff, #ddd);
            color: #111;
            border: none;
            padding: 18px 45px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.4s;
            width: 100%;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(255,255,255,0.2);
            margin-top: 15px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px white;
            background: white;
        }

        .submit-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ===== پنل ادمین ===== */
        .admin-panel {
            background: rgba(5,5,5,0.9);
            backdrop-filter: blur(20px);
            border: 2px solid #2a2a2a;
            border-radius: 60px;
            padding: 40px;
            box-shadow: 0 30px 80px black;
            animation: glowPulse 5s infinite;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .admin-tabs {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .admin-tab {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: #ccc;
        }

        .admin-tab.active {
            background: white;
            color: black;
            border-color: white;
            box-shadow: 0 0 25px white;
        }

        .admin-tab:hover {
            border-color: white;
        }

        .submissions-list {
            background: #111;
            border-radius: 40px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #2a2a2a;
        }

        .submission-item {
            background: #1c1c1c;
            border-radius: 30px;
            padding: 18px 25px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.2s;
        }

        .submission-item:hover {
            border-color: white;
            transform: translateX(-8px) scale(1.02);
            background: #252525;
        }

        .status {
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .status-pending { background: #444; color: white; }
        .status-approved { background: #00cc66; color: black; }
        .status-rejected { background: #cc3333; color: white; }

        .detail-card {
            background: #161616;
            border-radius: 40px;
            padding: 30px;
            margin-top: 25px;
            border: 1px solid #333;
        }

        .approve-btn, .reject-btn {
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 700;
            margin-left: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .approve-btn { background: #00cc66; color: black; }
        .reject-btn { background: #cc3333; color: white; }
        .approve-btn:hover { box-shadow: 0 0 20px #00cc66; }
        .reject-btn:hover { box-shadow: 0 0 20px #cc3333; }

        /* ===== مودال‌های گرافیکی پیشرفته ===== */
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15,15,15,0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 70px;
            padding: 45px;
            width: 90%;
            max-width: 500px;
            z-index: 2000;
            box-shadow: 0 40px 100px black, 0 0 0 1px rgba(255,255,255,0.05) inset;
            display: none;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .modal.active { display: block; }

        .modal h2 {
            margin-bottom: 30px;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .modal .input-icon {
            position: relative;
            margin-bottom: 25px;
        }

        .modal .input-icon i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 1.2rem;
            transition: 0.3s;
            z-index: 1;
        }

        .modal .input-icon input {
            width: 100%;
            padding: 18px 50px 18px 20px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #2a2a2a;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        .modal .input-icon input:focus {
            border-color: white;
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
            background: rgba(20,20,20,0.9);
        }

        .modal .input-icon input:focus + i {
            color: white;
        }

        .close-btn {
            position: absolute;
            top: 20px; left: 25px;
            font-size: 2rem;
            cursor: pointer;
            color: #aaa;
            transition: 0.2s;
            line-height: 1;
        }
        .close-btn:hover { color: white; transform: rotate(90deg); }

        .overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1500;
            display: none;
        }
        .overlay.active { display: block; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="particle-bg"></div>
    <div class="container">
        <!-- هدر پیشرفته -->
        <header class="glass-header">
            <div class="logo">
                <i class="fas fa-dragon"></i>
                <h1>رایزن رول‌پلی</h1>
            </div>
            <div class="user-actions">
                <!-- وضعیت کاربر معمولی -->
                <div id="userMenu">
                    <button class="user-btn" id="showUserLoginBtn"><i class="fas fa-sign-in-alt"></i> ورود</button>
                    <button class="user-btn" id="showUserRegisterBtn"><i class="fas fa-user-plus"></i> ثبت‌نام</button>
                </div>
                <div id="userLoggedMenu" style="display: none;">
                    <span class="user-btn" style="background:#222;"><i class="fas fa-user-circle"></i> <span id="loggedUsername"></span></span>
                    <button class="user-btn" id="userLogoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
                </div>
                <!-- آیکون پیگیری -->
                <div class="envelope-icon" id="envelopeIcon">
                    <i class="fas fa-inbox"></i>
                    <span class="unread-badge" id="unreadCount">0</span>
                </div>
                <!-- ورود ادمین -->
                <button class="user-btn" id="showAdminLoginBtn" style="border-color: #666;"><i class="fas fa-lock"></i> ادمین</button>
            </div>
        </header>

        <!-- نمای عمومی (فرم‌ها) -->
        <div id="publicView">
            <div class="form-switcher">
                <button class="switch-btn active" id="btnLeadership">فرم لیدری</button>
                <button class="switch-btn" id="btnAdminForm">فرم ادمینی</button>
            </div>
            <div id="leadershipFormContainer" class="form-container"></div>
            <div id="adminFormContainer" class="form-container hidden"></div>
        </div>

        <!-- پنل ادمین (مخفی) -->
        <div id="adminPanel" class="admin-panel hidden"></div>
    </div>

    <!-- مودال‌های گرافیکی -->
    <div class="overlay" id="overlay"></div>

    <!-- مودال ورود کاربر -->
    <div class="modal" id="userLoginModal">
        <span class="close-btn" id="closeUserLogin">&times;</span>
        <h2>ورود</h2>
        <div class="input-icon">
            <i class="fas fa-user"></i>
            <input type="text" id="loginUsername" placeholder="نام کاربری">
        </div>
        <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="رمز عبور">
        </div>
        <button class="submit-btn" id="userLoginBtn">ورود</button>
    </div>

    <!-- مودال ثبت‌نام کاربر -->
    <div class="modal" id="userRegisterModal">
        <span class="close-btn" id="closeUserRegister">&times;</span>
        <h2>ثبت‌نام</h2>
        <div class="input-icon">
            <i class="fas fa-user"></i>
            <input type="text" id="regUsername" placeholder="نام کاربری">
        </div>
        <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="regPassword" placeholder="رمز عبور">
        </div>
        <button class="submit-btn" id="userRegisterBtn">ثبت‌نام</button>
    </div>

    <!-- مودال ورود ادمین -->
    <div class="modal" id="adminLoginModal">
        <span class="close-btn" id="closeAdminLogin">&times;</span>
        <h2>ورود ادمین</h2>
        <div class="input-icon">
            <i class="fas fa-user-shield"></i>
            <input type="text" id="adminUsername" placeholder="نام کاربری">
        </div>
        <div class="input-icon">
            <i class="fas fa-key"></i>
            <input type="password" id="adminPassword" placeholder="رمز عبور">
        </div>
        <button class="submit-btn" id="adminLoginBtn">ورود</button>
    </div>

    <!-- مودال پیگیری وضعیت -->
    <div class="modal" id="trackModal">
        <span class="close-btn" id="closeTrackModal">&times;</span>
        <h2>وضعیت درخواست‌ها</h2>
        <div id="trackList" style="max-height: 300px; overflow-y: auto; margin-top: 20px;"></div>
    </div>

    <script>
        (function() {
            // ==================== ذخیره‌سازی ====================
            const STORAGE_KEYS = {
                USERS: 'rp_users_v2',
                SUBMISSIONS: 'rp_submissions_v2',
                ADMINS: 'rp_admins_v2',
                SITE_LOCKED: 'rp_locked',
                CURRENT_USER: 'rp_current_user'
            };

            const DEFAULT_ADMIN = { username: 'Mamad', password: 'polese', isOwner: true };

            // ---------- توابع کمکی ----------
            function getUsers() {
                return JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
            }
            function saveUsers(users) {
                localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));
            }

            function getSubmissions() {
                return JSON.parse(localStorage.getItem(STORAGE_KEYS.SUBMISSIONS) || '[]');
            }
            function saveSubmissions(subs) {
                localStorage.setItem(STORAGE_KEYS.SUBMISSIONS, JSON.stringify(subs));
            }

            function getAdmins() {
                let admins = JSON.parse(localStorage.getItem(STORAGE_KEYS.ADMINS) || '[]');
                if (admins.length === 0) {
                    admins = [DEFAULT_ADMIN];
                    localStorage.setItem(STORAGE_KEYS.ADMINS, JSON.stringify(admins));
                }
                return admins;
            }
            function saveAdmins(admins) {
                localStorage.setItem(STORAGE_KEYS.ADMINS, JSON.stringify(admins));
            }

            function isSiteLocked() {
                return localStorage.getItem(STORAGE_KEYS.SITE_LOCKED) === 'true';
            }
            function setSiteLocked(locked) {
                localStorage.setItem(STORAGE_KEYS.SITE_LOCKED, locked);
            }

            // ---------- وضعیت نشست ----------
            let currentUser = null;
            let currentAdmin = null;
            let activePublicForm = 'leadership';
            let activeAdminTab = 'leadership';
            let selectedSubmissionId = null;
            let selectedUserId = null;

            // ---------- عناصر DOM ----------
            const publicView = document.getElementById('publicView');
            const adminPanelDiv = document.getElementById('adminPanel');
            const btnLeadership = document.getElementById('btnLeadership');
            const btnAdminForm = document.getElementById('btnAdminForm');
            const leadershipContainer = document.getElementById('leadershipFormContainer');
            const adminFormContainer = document.getElementById('adminFormContainer');
            const envelopeIcon = document.getElementById('envelopeIcon');
            const unreadSpan = document.getElementById('unreadCount');

            const userMenu = document.getElementById('userMenu');
            const userLoggedMenu = document.getElementById('userLoggedMenu');
            const loggedUsernameSpan = document.getElementById('loggedUsername');

            // modals
            const overlay = document.getElementById('overlay');
            const userLoginModal = document.getElementById('userLoginModal');
            const userRegisterModal = document.getElementById('userRegisterModal');
            const adminLoginModal = document.getElementById('adminLoginModal');
            const trackModal = document.getElementById('trackModal');

            // buttons
            document.getElementById('showUserLoginBtn').addEventListener('click', () => openModal(userLoginModal));
            document.getElementById('showUserRegisterBtn').addEventListener('click', () => openModal(userRegisterModal));
            document.getElementById('showAdminLoginBtn').addEventListener('click', () => openModal(adminLoginModal));
            document.getElementById('closeUserLogin').addEventListener('click', () => closeModal(userLoginModal));
            document.getElementById('closeUserRegister').addEventListener('click', () => closeModal(userRegisterModal));
            document.getElementById('closeAdminLogin').addEventListener('click', () => closeModal(adminLoginModal));
            document.getElementById('closeTrackModal').addEventListener('click', () => closeModal(trackModal));
            document.getElementById('userLoginBtn').addEventListener('click', handleUserLogin);
            document.getElementById('userRegisterBtn').addEventListener('click', handleUserRegister);
            document.getElementById('adminLoginBtn').addEventListener('click', handleAdminLogin);
            document.getElementById('userLogoutBtn')?.addEventListener('click', userLogout);

            envelopeIcon.addEventListener('click', showTrackModal);
            overlay.addEventListener('click', closeAllModals);

            function openModal(modal) {
                closeAllModals();
                modal.classList.add('active');
                overlay.classList.add('active');
            }
            function closeModal(modal) {
                modal.classList.remove('active');
                overlay.classList.remove('active');
            }
            function closeAllModals() {
                userLoginModal.classList.remove('active');
                userRegisterModal.classList.remove('active');
                adminLoginModal.classList.remove('active');
                trackModal.classList.remove('active');
                overlay.classList.remove('active');
            }

            // ==================== مدیریت کاربران ====================
            function handleUserRegister() {
                const username = document.getElementById('regUsername').value.trim();
                const password = document.getElementById('regPassword').value.trim();
                if (!username || !password) return alert('نام کاربری و رمز را پر کنید');
                let users = getUsers();
                if (users.find(u => u.username === username)) {
                    return alert('این نام کاربری قبلاً ثبت شده است');
                }
                const newUser = { id: 'u_' + Date.now() + Math.random().toString(36), username, password, registered: new Date().toISOString() };
                users.push(newUser);
                saveUsers(users);
                alert('ثبت‌نام موفق. حالا وارد شوید.');
                closeModal(userRegisterModal);
            }

            function handleUserLogin() {
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                const users = getUsers();
                const user = users.find(u => u.username === username && u.password === password);
                if (!user) return alert('نام کاربری یا رمز اشتباه');
                currentUser = { id: user.id, username: user.username };
                updateUserMenu();
                closeModal(userLoginModal);
                renderLeadershipForm();
                renderAdminForm();
                updateUnreadCount();
            }

            function userLogout() {
                currentUser = null;
                updateUserMenu();
                renderLeadershipForm();
                renderAdminForm();
                updateUnreadCount();
            }

            function updateUserMenu() {
                if (currentUser) {
                    userMenu.style.display = 'none';
                    userLoggedMenu.style.display = 'flex';
                    loggedUsernameSpan.textContent = currentUser.username;
                } else {
                    userMenu.style.display = 'flex';
                    userLoggedMenu.style.display = 'none';
                }
            }

            // ==================== مدیریت ادمین ====================
            function handleAdminLogin() {
                const username = document.getElementById('adminUsername').value.trim();
                const password = document.getElementById('adminPassword').value.trim();
                const admins = getAdmins();
                const admin = admins.find(a => a.username === username && a.password === password);
                if (!admin) return alert('ادمین نامعتبر');
                currentAdmin = { username: admin.username, isOwner: admin.isOwner || false };
                publicView.classList.add('hidden');
                adminPanelDiv.classList.remove('hidden');
                closeModal(adminLoginModal);
                renderAdminPanel();
            }

            function logoutAdmin() {
                currentAdmin = null;
                publicView.classList.remove('hidden');
                adminPanelDiv.classList.add('hidden');
                renderLeadershipForm();
                renderAdminForm();
                setActivePublicForm(activePublicForm);
            }

            // ==================== فرم‌ها ====================
            function renderLeadershipForm() {
                const locked = isSiteLocked();
                const disabled = locked || !currentUser ? 'disabled' : '';
                leadershipContainer.innerHTML = `
                    <div class="form-title">فرم لیدری</div>
                    <form id="leadershipForm" onsubmit="event.preventDefault(); submitLeadershipForm();">
                        <div class="input-group"><label>نام (واقعی)</label><input type="text" id="lead_realname" required ${disabled}></div>
                        <div class="input-group"><label>سن</label><input type="number" id="lead_age" required ${disabled}></div>
                        <div class="input-group"><label>خصوصیات اخلاقی</label><textarea id="lead_moral" required ${disabled}></textarea></div>
                        <div class="input-group"><label>نام درون سرور</label><input type="text" id="lead_ingame" required ${disabled}></div>
                        <div class="input-group"><label>سن شهری (لول)</label><input type="text" id="lead_citylevel" required ${disabled}></div>
                        <div class="input-group"><label>سوابق حضور در فکشن‌ها</label><textarea id="lead_prevfactions" required ${disabled}></textarea></div>
                        <div class="input-group"><label>فکشن مورد نظر برای لیدری</label><input type="text" id="lead_targetfaction" required ${disabled}></div>
                        <div class="input-group"><label>ایده برای فکشن (حداقل ۴)</label><textarea id="lead_ideas" required ${disabled} placeholder="هر ایده در یک خط"></textarea></div>
                        <div class="input-group"><label>آخرین وارن/ورک/جیل</label><input type="text" id="lead_lastwarn" required ${disabled}></div>
                        <button type="submit" class="submit-btn" ${disabled}>ارسال درخواست</button>
                    </form>
                    ${!currentUser ? '<p style="color: #ffaa00; text-align: center; margin-top: 20px;">برای ارسال فرم وارد حساب خود شوید.</p>' : ''}
                    ${locked ? '<p style="color: red; text-align: center;">سایت توسط ادمین قفل شده است.</p>' : ''}
                `;
            }

            function renderAdminForm() {
                const locked = isSiteLocked();
                const disabled = locked || !currentUser ? 'disabled' : '';
                adminFormContainer.innerHTML = `
                    <div class="form-title">فرم ادمینی</div>
                    <form id="adminForm" onsubmit="event.preventDefault(); submitAdminForm();">
                        <div class="input-group"><label>نام</label><input type="text" id="admin_name" required ${disabled}></div>
                        <div class="input-group"><label>سن</label><input type="number" id="admin_age" required ${disabled}></div>
                        <div class="input-group"><label>شماره تماس</label><input type="text" id="admin_phone" required ${disabled}></div>
                        <div class="input-group"><label>خصوصیات اخلاقی</label><textarea id="admin_moral" required ${disabled}></textarea></div>
                        <div class="input-group"><label>نام درون گیم</label><input type="text" id="admin_ingame" required ${disabled}></div>
                        <div class="input-group"><label>سن شهری (بالای ۱۵)</label><input type="number" id="admin_cityage" min="16" required ${disabled}></div>
                        <div class="input-group"><label>سابقه استف؟</label><select id="admin_staffexp" required ${disabled}><option value="">انتخاب</option><option value="بله">بله</option><option value="خیر">خیر</option></select></div>
                        <div class="input-group"><label>سوابق فکشن خود</label><textarea id="admin_factionexp" required ${disabled}></textarea></div>
                        <div class="input-group"><label>آیا مایک دارید؟</label><select id="admin_mic" required ${disabled}><option value="">انتخاب</option><option value="بله">بله</option><option value="خیر">خیر</option></select></div>
                        <div class="input-group"><label>چرا ادمین خوبی هستید؟</label><textarea id="admin_why" required ${disabled}></textarea></div>
                        <div class="input-group"><label>چند نمونه ارپی</label><textarea id="admin_rp" required ${disabled}></textarea></div>
                        <button type="submit" class="submit-btn" ${disabled}>ارسال درخواست</button>
                    </form>
                    ${!currentUser ? '<p style="color: #ffaa00; text-align: center;">برای ارسال فرم وارد حساب خود شوید.</p>' : ''}
                    ${locked ? '<p style="color: red; text-align: center;">سایت قفل است.</p>' : ''}
                `;
            }

            window.submitLeadershipForm = function() {
                if (!currentUser) return alert('لطفا ابتدا وارد شوید');
                if (isSiteLocked()) return alert('سایت قفل است');
                const formData = {
                    realname: document.getElementById('lead_realname').value,
                    age: document.getElementById('lead_age').value,
                    moral: document.getElementById('lead_moral').value,
                    ingame: document.getElementById('lead_ingame').value,
                    citylevel: document.getElementById('lead_citylevel').value,
                    prevfactions: document.getElementById('lead_prevfactions').value,
                    targetfaction: document.getElementById('lead_targetfaction').value,
                    ideas: document.getElementById('lead_ideas').value,
                    lastwarn: document.getElementById('lead_lastwarn').value
                };
                if (!formData.realname) return;
                const subs = getSubmissions();
                const newSub = {
                    id: 'sub_' + Date.now() + Math.random().toString(36),
                    type: 'leadership',
                    formData,
                    status: 'pending',
                    userId: currentUser.id,
                    timestamp: new Date().toISOString()
                };
                subs.push(newSub);
                saveSubmissions(subs);
                alert('درخواست شما ارسال شد');
                document.getElementById('leadershipForm').reset();
                updateUnreadCount();
            };

            window.submitAdminForm = function() {
                if (!currentUser) return alert('لطفا وارد شوید');
                if (isSiteLocked()) return alert('سایت قفل است');
                const formData = {
                    name: document.getElementById('admin_name').value,
                    age: document.getElementById('admin_age').value,
                    phone: document.getElementById('admin_phone').value,
                    moral: document.getElementById('admin_moral').value,
                    ingame: document.getElementById('admin_ingame').value,
                    cityage: document.getElementById('admin_cityage').value,
                    staffexp: document.getElementById('admin_staffexp').value,
                    factionexp: document.getElementById('admin_factionexp').value,
                    mic: document.getElementById('admin_mic').value,
                    why: document.getElementById('admin_why').value,
                    rp: document.getElementById('admin_rp').value
                };
                if (!formData.name) return;
                const subs = getSubmissions();
                const newSub = {
                    id: 'sub_' + Date.now() + Math.random().toString(36),
                    type: 'admin',
                    formData,
                    status: 'pending',
                    userId: currentUser.id,
                    timestamp: new Date().toISOString()
                };
                subs.push(newSub);
                saveSubmissions(subs);
                alert('درخواست شما ارسال شد');
                document.getElementById('adminForm').reset();
                updateUnreadCount();
            };

            // ==================== پنل ادمین ====================
            function renderAdminPanel() {
                if (!currentAdmin) return;
                const isOwner = currentAdmin.isOwner;
                const locked = isSiteLocked();
                const subs = getSubmissions();
                const users = getUsers();

                let content = '';
                if (activeAdminTab === 'users') {
                    content = `
                        <div class="admin-header">
                            <h2>مدیریت کاربران</h2>
                            <button class="admin-tab" id="backFromUsers">بازگشت به فرم‌ها</button>
                        </div>
                        <div class="submissions-list">
                            ${users.map(u => `
                                <div class="user-list-item" onclick="selectUser('${u.id}')">
                                    <span><i class="fas fa-user"></i> ${u.username}</span>
                                    <span>${subs.filter(s => s.userId === u.id).length} درخواست</span>
                                </div>
                            `).join('')}
                        </div>
                        ${selectedUserId ? renderUserSubmissions(selectedUserId, subs, users) : ''}
                    `;
                } else {
                    const list = subs.filter(s => s.type === activeAdminTab);
                    content = `
                        <div class="admin-header">
                            <h2>مدیریت فرم‌ها</h2>
                            <div>
                                <button class="admin-btn" id="lockToggleBtn">${locked ? 'بازگشایی' : 'قفل سایت'}</button>
                                ${isOwner ? '<button class="admin-btn" id="addAdminBtn">+ ادمین</button>' : ''}
                                <button class="admin-btn" id="logoutAdminBtn">خروج</button>
                            </div>
                        </div>
                        <div class="admin-tabs">
                            <button class="admin-tab ${activeAdminTab === 'leadership' ? 'active' : ''}" id="tabLeadership">لیدری (${subs.filter(s => s.type==='leadership').length})</button>
                            <button class="admin-tab ${activeAdminTab === 'admin' ? 'active' : ''}" id="tabAdmin">ادمینی (${subs.filter(s => s.type==='admin').length})</button>
                            <button class="admin-tab" id="tabUsers">کاربران (${users.length})</button>
                        </div>
                        <div class="submissions-list">
                            ${list.map(sub => {
                                const user = users.find(u => u.id === sub.userId) || { username: 'ناشناس' };
                                return `
                                    <div class="submission-item" onclick="selectSubmission('${sub.id}')">
                                        <span>${user.username} - ${sub.formData.realname || sub.formData.name}</span>
                                        <span class="status status-${sub.status}">${sub.status}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        ${selectedSubmissionId ? renderSubmissionDetail(selectedSubmissionId, subs) : ''}
                    `;
                }

                adminPanelDiv.innerHTML = content;
                document.getElementById('lockToggleBtn')?.addEventListener('click', toggleLock);
                if (isOwner) document.getElementById('addAdminBtn')?.addEventListener('click', addAdminPrompt);
                document.getElementById('logoutAdminBtn')?.addEventListener('click', logoutAdmin);
                document.getElementById('tabLeadership')?.addEventListener('click', () => { activeAdminTab = 'leadership'; selectedSubmissionId = null; renderAdminPanel(); });
                document.getElementById('tabAdmin')?.addEventListener('click', () => { activeAdminTab = 'admin'; selectedSubmissionId = null; renderAdminPanel(); });
                document.getElementById('tabUsers')?.addEventListener('click', () => { activeAdminTab = 'users'; selectedUserId = null; renderAdminPanel(); });
                document.getElementById('backFromUsers')?.addEventListener('click', () => { activeAdminTab = 'leadership'; renderAdminPanel(); });
            }

            function renderSubmissionDetail(id, subs) {
                const sub = subs.find(s => s.id === id);
                if (!sub) return '';
                return `
                    <div class="detail-card">
                        <h3>جزئیات درخواست</h3>
                        <pre style="background:#222; padding:15px; border-radius:20px;">${JSON.stringify(sub.formData, null, 2)}</pre>
                        <p>وضعیت: <span class="status status-${sub.status}">${sub.status}</span></p>
                        <div>
                            <button class="approve-btn" onclick="updateSubmissionStatus('${sub.id}', 'approved')">تایید</button>
                            <button class="reject-btn" onclick="updateSubmissionStatus('${sub.id}', 'rejected')">رد</button>
                        </div>
                    </div>
                `;
            }

            function renderUserSubmissions(userId, subs, users) {
                const user = users.find(u => u.id === userId);
                const userSubs = subs.filter(s => s.userId === userId);
                return `
                    <div class="detail-card">
                        <h3>درخواست‌های کاربر: ${user?.username}</h3>
                        ${userSubs.map(s => `
                            <div style="background:#222; padding:15px; border-radius:20px; margin-bottom:10px;">
                                <p>نوع: ${s.type === 'leadership' ? 'لیدری' : 'ادمینی'} | وضعیت: <span class="status status-${s.status}">${s.status}</span></p>
                                <pre style="font-size:0.8rem;">${JSON.stringify(s.formData, null, 2)}</pre>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            window.selectSubmission = function(id) { selectedSubmissionId = id; renderAdminPanel(); };
            window.selectUser = function(id) { selectedUserId = id; renderAdminPanel(); };
            window.updateSubmissionStatus = function(id, status) {
                let subs = getSubmissions();
                const idx = subs.findIndex(s => s.id === id);
                if (idx !== -1) { subs[idx].status = status; saveSubmissions(subs); }
                renderAdminPanel();
            };

            function toggleLock() {
                setSiteLocked(!isSiteLocked());
                renderAdminPanel();
                renderLeadershipForm();
                renderAdminForm();
            }

            function addAdminPrompt() {
                const user = prompt('نام کاربری ادمین جدید:');
                if (!user) return;
                const pass = prompt('رمز عبور:');
                if (!pass) return;
                const admins = getAdmins();
                admins.push({ username: user, password: pass, isOwner: false });
                saveAdmins(admins);
                alert('ادمین اضافه شد');
            }

            // ==================== پیگیری ====================
            function updateUnreadCount() {
                if (!currentUser) { unreadSpan.textContent = '0'; return; }
                const subs = getSubmissions().filter(s => s.userId === currentUser.id).length;
                unreadSpan.textContent = subs;
            }

            function showTrackModal() {
                if (!currentUser) return alert('لطفا وارد حساب خود شوید');
                const subs = getSubmissions().filter(s => s.userId === currentUser.id);
                const listHtml = subs.length ? subs.map(s => `
                    <div style="background:#222; border-radius:20px; padding:15px; margin-bottom:15px;">
                        <div><strong>نوع:</strong> ${s.type === 'leadership' ? 'لیدری' : 'ادمینی'}</div>
                        <div><strong>وضعیت:</strong> <span class="status status-${s.status}">${s.status}</span></div>
                        <div><strong>تاریخ:</strong> ${new Date(s.timestamp).toLocaleDateString('fa')}</div>
                    </div>
                `).join('') : '<p>تاکنون درخواستی ثبت نکرده‌اید.</p>';
                document.getElementById('trackList').innerHTML = listHtml;
                openModal(trackModal);
            }

            // ==================== ابتدا ====================
            function setActivePublicForm(type) {
                activePublicForm = type;
                if (type === 'leadership') {
                    btnLeadership.classList.add('active');
                    btnAdminForm.classList.remove('active');
                    leadershipContainer.classList.remove('hidden');
                    adminFormContainer.classList.add('hidden');
                } else {
                    btnAdminForm.classList.add('active');
                    btnLeadership.classList.remove('active');
                    adminFormContainer.classList.remove('hidden');
                    leadershipContainer.classList.add('hidden');
                }
            }

            btnLeadership.addEventListener('click', () => setActivePublicForm('leadership'));
            btnAdminForm.addEventListener('click', () => setActivePublicForm('adminForm'));

            // initial render
            getAdmins(); // ensure default admin
            renderLeadershipForm();
            renderAdminForm();
            updateUserMenu();
            updateUnreadCount();
        })();
    </script>
</body>
</html>
